name: knowledge

# Two jobs, zero extra stack:
#   lint          — PR gate: schema-validate changed wiki units (replaces a curator)
#   publish-wiki  — on merge to main: render docs/wiki/ and push to the GitHub Wiki
#
# Prerequisites for publish-wiki:
#  1. The repo's wiki must already exist: repo → Wiki → "Create the first page",
#     save anything (a wiki can't be pushed to until it exists). After that this
#     Action owns it. Wiki visibility follows the repo (private repo → private wiki).
#     The wiki is a DERIVED MIRROR: edit docs/wiki/, not the UI.
#  2. Push auth — pick ONE, by what your org policy allows (push step tries them in
#     this order). Add secrets under repo → Settings → Secrets and variables → Actions.
#       - WIKI_SSH_KEY  (recommended for teams): a write Deploy Key. Repo-bound, NOT
#         tied to a personal user — survives offboarding. See the push step for the
#         ssh-keygen recipe. SSH push.
#       - WIKI_TOKEN: a PAT (fine-grained Contents: RW, or classic scope `repo`).
#         User-bound. Use when the "Workflow permissions" toggle is greyed out.
#       - GITHUB_TOKEN (built-in): works only if the org allows write (that toggle).

on:
  pull_request:
    paths: ["docs/wiki/**"]
  push:
    branches: [main]
    paths: ["docs/wiki/**"]

permissions:
  contents: write        # required so publish-wiki can push to <repo>.wiki.git

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml
      - name: Schema gate (corpus mode)
        run: python3 docs/wiki/wiki-lint docs/wiki/
      - name: Drift gate — verify source anchors still resolve
        run: python3 docs/wiki/wiki-verify docs/wiki/ --repo-root .

  publish-wiki:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml
      - name: Render wiki pages
        run: |
          python3 docs/wiki/wiki-render docs/wiki/ --out .wiki-build \
            --repo-url "${{ github.server_url }}/${{ github.repository }}"
      - name: Refresh source-anchor manifest
        run: python3 docs/wiki/wiki-manifest docs/wiki/ --repo "${{ github.event.repository.name }}"
      - name: Push to GitHub Wiki
        # Three-way auth, pick whatever your org policy allows (no marketplace action):
        #   1. WIKI_SSH_KEY — a write Deploy Key (repo-bound, NOT tied to a personal
        #      user; best for teams). SSH push. Preferred when set.
        #   2. WIKI_TOKEN   — a PAT (Contents: RW). HTTPS push. Use when the repo
        #      "Workflow permissions" toggle is greyed out by org policy.
        #   3. GITHUB_TOKEN — the built-in token. Works only if the org allows write.
        # Set up the Deploy Key:
        #   ssh-keygen -t ed25519 -f wiki_deploy_key -N "" -C wiki-publish
        #   add wiki_deploy_key.pub  → repo Settings → Deploy keys (✓ Allow write access)
        #   add wiki_deploy_key (private) → repo Settings → Secrets → Actions → WIKI_SSH_KEY
        env:
          WIKI_SSH_KEY: ${{ secrets.WIKI_SSH_KEY }}
          GH_TOKEN: ${{ secrets.WIKI_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "knowledge-bot"
          git config --global user.email "knowledge-bot@users.noreply.github.com"
          if [ -n "${WIKI_SSH_KEY}" ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "${WIKI_SSH_KEY}" > ~/.ssh/wiki_key
            chmod 600 ~/.ssh/wiki_key
            ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/wiki_key -o IdentitiesOnly=yes"
            WIKI_URL="git@github.com:${GITHUB_REPOSITORY}.wiki.git"
          else
            WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          fi
          git clone "${WIKI_URL}" wiki
          rm -f wiki/*.md
          cp .wiki-build/*.md wiki/
          cd wiki
          git add -A
          git diff --cached --quiet || git commit -m "wiki: sync from docs/wiki/ @ ${GITHUB_SHA::7}"
          git push

# The code graph is NOT built in CI and NOT committed — it is a derived artifact built
# locally on demand (graphify/run build.py) in whatever worktree you're in, gitignored.
# This avoids merge conflicts on a generated file across parallel devs/worktrees. CI's
# graph role is the deterministic drift gate above (wiki-verify), no venv needed.
