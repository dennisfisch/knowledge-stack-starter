name: knowledge

# Two jobs, zero extra stack:
#   lint          — PR gate: schema-validate changed wiki units (replaces a curator)
#   publish-wiki  — on merge to main: render docs/wiki/ and push to the GitHub Wiki
#
# Prerequisites for publish-wiki:
#  1. The repo's wiki must already exist: repo → Wiki → "Create the first page",
#     save anything (a wiki can't be pushed to until it exists). After that this
#     Action owns it. Wiki visibility follows the repo (private repo → private wiki).
#     The wiki is a DERIVED MIRROR: edit docs/wiki/, not the UI.
#  2. A token that can push to the wiki. The built-in GITHUB_TOKEN works ONLY if the
#     org allows write (the repo "Workflow permissions" toggle). If that toggle is
#     greyed out (org/enterprise-managed) or you'd rather not depend on it, create a
#     token and store it as the repo secret WIKI_TOKEN — the push step prefers it and
#     falls back to GITHUB_TOKEN. Options for WIKI_TOKEN (any one):
#       - Fine-grained PAT: Repository access = this repo, Permissions → Contents: RW.
#       - Classic PAT: scope `repo` (most reliable for wikis).
#       - Deploy key with write access (most scoped; add private key as the secret).
#     Add it under repo → Settings → Secrets and variables → Actions → New secret.

on:
  pull_request:
    paths: ["docs/wiki/**"]
  push:
    branches: [main]
    paths: ["docs/wiki/**"]

permissions:
  contents: write        # required so publish-wiki can push to <repo>.wiki.git

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml
      - name: Schema gate (corpus mode)
        run: python3 docs/wiki/wiki-lint docs/wiki/

  publish-wiki:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml
      - name: Render wiki pages
        run: |
          python3 docs/wiki/wiki-render docs/wiki/ --out .wiki-build \
            --repo-url "${{ github.server_url }}/${{ github.repository }}"
      - name: Refresh source-anchor manifest
        run: python3 docs/wiki/wiki-manifest docs/wiki/ --repo "${{ github.event.repository.name }}"
      - name: Push to GitHub Wiki
        # Prefer a dedicated WIKI_TOKEN secret (works even when the repo "Workflow
        # permissions" toggle is greyed out by org policy); fall back to GITHUB_TOKEN.
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name  "knowledge-bot"
          git config --global user.email "knowledge-bot@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki
          rm -f wiki/*.md
          cp .wiki-build/*.md wiki/
          cd wiki
          git add -A
          git diff --cached --quiet || git commit -m "wiki: sync from docs/wiki/ @ ${GITHUB_SHA::7}"
          git push

